<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WatchList — MediaVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#080b12; --surface:#0e1320; --card:#131828; --border:#1e2a45;
  --accent:#e63946; --accent2:#f4a261; --gold:#ffd166;
  --text:#e8eaf0; --muted:#6b7a99; --tag:#1a2340;
  --purple:#a78bfa; --teal:#4cc9f0; --green:#4ade80;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(230,57,70,.08) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 90% 100%,rgba(244,162,97,.06) 0%,transparent 60%);}

/* HEADER */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:20px 36px;border-bottom:1px solid var(--border);background:rgba(8,11,18,.85);backdrop-filter:blur(14px);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo span{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;
  display:block;margin-top:-4px;-webkit-text-fill-color:var(--muted);background:none;}
.hdr-pills{display:flex;gap:8px;}
.hdr-pill{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
  background:var(--surface);padding:5px 13px;border-radius:20px;border:1px solid var(--border);}
.hdr-pill.red{color:var(--accent);border-color:rgba(230,57,70,.35);background:rgba(230,57,70,.07);}

/* LAYOUT */
.main{position:relative;z-index:1;display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 74px);}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);padding:28px 24px;background:var(--surface);
  overflow-y:auto;max-height:calc(100vh - 74px);position:sticky;top:74px;}
.sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);
  margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.sidebar-title::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:16px;}
label{display:block;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
input,select,textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 13px;outline:none;
  transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,57,70,.12);}
select option{background:var(--card);}
textarea{resize:vertical;min-height:80px;line-height:1.5;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:22px 14px;text-align:center;
  background:var(--card);position:relative;cursor:pointer;transition:border-color .2s,background .2s;overflow:hidden;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(230,57,70,.04);}
.upload-zone input[type="file"]{position:absolute;inset:0;width:100%;height:100%;
  opacity:0;cursor:pointer;z-index:5;border:none;padding:0;margin:0;}
.upload-icon{font-size:28px;margin-bottom:6px;pointer-events:none;}
.upload-text{font-size:12px;color:var(--muted);line-height:1.5;pointer-events:none;}
.upload-preview{width:100%;max-height:180px;object-fit:cover;border-radius:9px;
  margin-top:10px;display:none;pointer-events:none;}

/* Stars */
.stars{display:flex;gap:5px;margin-top:4px;}
.star{font-size:20px;cursor:pointer;transition:transform .1s;filter:grayscale(1);opacity:.35;}
.star.active{filter:none;opacity:1;}
.star:hover{transform:scale(1.2);}

/* Buttons */
.btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),#c1121f);border:none;color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;padding:13px;border-radius:11px;
  cursor:pointer;transition:opacity .2s,transform .1s;margin-top:6px;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-ai{width:100%;background:linear-gradient(135deg,#1e2a45,#2a3a60);border:1px solid var(--border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 13px;
  border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;
  gap:8px;margin-bottom:14px;}
.btn-ai:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-ai .spinner{width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;
  border-radius:50%;animation:spin .7s linear infinite;display:none;}
.btn-ai.loading .spinner{display:block;}.btn-ai.loading .ai-icon{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CONTENT */
.content{padding:28px;overflow-y:auto;}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.content-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--muted);}
.search-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:220px;transition:border-color .2s;}
.search-bar:focus{border-color:var(--accent);}
.filter-tabs{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap;}
.tab{font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 13px;border-radius:20px;
  border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.tab.active,.tab:hover{border-color:var(--accent);color:var(--accent);background:rgba(230,57,70,.08);}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;}
.media-card{background:var(--card);border:1px solid var(--border);border-radius:15px;
  transition:transform .25s,border-color .25s,box-shadow .25s;animation:cardIn .35s ease both;
  position:relative;overflow:visible;}
.media-card-inner{border-radius:15px;overflow:hidden;}
@keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.media-card:hover{transform:translateY(-4px);border-color:rgba(230,57,70,.4);
  box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(230,57,70,.1);}
.card-image{width:100%;height:auto;max-height:420px;object-fit:contain;background:var(--surface);display:block;}
.card-placeholder{width:100%;height:170px;background:linear-gradient(135deg,var(--surface),var(--tag));
  display:flex;align-items:center;justify-content:center;font-size:46px;}
.card-body{padding:14px;}
.card-type{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;
  line-height:1.1;margin-bottom:7px;color:var(--text);}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.mtag{font-size:10px;padding:3px 9px;background:var(--tag);border-radius:20px;
  color:var(--muted);font-family:'JetBrains Mono',monospace;}
.mtag.hi{color:var(--gold);background:rgba(255,209,102,.1);}
.card-desc{font-size:12px;color:var(--muted);line-height:1.55;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;}
.card-rating{font-size:13px;margin-bottom:9px;}

/* Card footer */
.card-footer{display:flex;gap:6px;border-top:1px solid var(--border);padding-top:11px;margin-top:3px;flex-wrap:wrap;}
.btn-sm{font-size:11px;padding:6px 9px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;
  font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.copy:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-sm.edit-btn{color:var(--purple);}
.btn-sm.edit-btn:hover{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.07);}
.btn-sm.watch-btn:hover{border-color:var(--teal);color:var(--teal);}
.btn-sm.del:hover{border-color:var(--accent);color:var(--accent);}

/* Status badge */
.status-badge{position:absolute;top:10px;right:10px;font-size:9px;font-family:'JetBrains Mono',monospace;
  padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;z-index:2;}
.sb-watching{background:rgba(230,57,70,.85);color:#fff;}
.sb-completed{background:rgba(74,222,128,.85);color:#000;}
.sb-planned{background:rgba(100,120,200,.85);color:#fff;}
.sb-dropped{background:rgba(100,100,100,.7);color:#ddd;}

/* 3-dot menu */
.dots-wrap{position:relative;}
.btn-dots{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .18s;letter-spacing:-1px;}
.btn-dots:hover{border-color:var(--accent2);color:var(--accent2);}
.dots-menu{display:none;position:absolute;bottom:calc(100% + 5px);right:0;
  background:#1a2240;border:1px solid var(--border);border-radius:12px;overflow:hidden;
  z-index:200;min-width:178px;box-shadow:0 8px 32px rgba(0,0,0,.55);animation:menuPop .15s ease both;}
.dots-menu.open{display:block;}
@keyframes menuPop{from{opacity:0;transform:translateY(5px) scale(.96);}to{opacity:1;transform:none;}}
.dots-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);
  padding:9px 13px 5px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.dots-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 13px;background:transparent;
  border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background .15s;text-align:left;}
.dots-item:hover{background:rgba(255,255,255,.05);}
.dots-item.is-active{color:var(--gold);}
.di{font-size:14px;width:18px;text-align:center;}

/* Empty */
.empty-state{grid-column:1/-1;text-align:center;padding:70px 20px;}
.empty-icon{font-size:58px;margin-bottom:14px;opacity:.35;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--muted);}
.empty-sub{font-size:13px;color:var(--muted);opacity:.55;margin-top:6px;}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card);
  border:1px solid var(--border);border-left:4px solid var(--accent);color:var(--text);
  padding:13px 18px;border-radius:11px;font-size:13px;font-weight:500;z-index:9999;
  opacity:0;transform:translateY(16px);transition:all .28s;max-width:280px;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;
  backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;
  width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative;animation:cardIn .22s ease both;}
.mbox.wide{max-width:600px;}
.mclose{position:absolute;top:14px;right:14px;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;}
.mclose:hover{color:var(--accent);border-color:var(--accent);}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;
  color:var(--text);margin-bottom:18px;padding-right:36px;line-height:1.2;}
.mimg{width:100%;max-height:220px;object-fit:cover;border-radius:11px;margin-bottom:18px;}
.drow{display:grid;grid-template-columns:130px 1fr;gap:8px;padding:9px 0;
  border-bottom:1px solid var(--border);font-size:13px;}
.drow:last-of-type{border-bottom:none;}
.dk{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;align-self:start;padding-top:1px;}
.dv{color:var(--text);line-height:1.5;}
.wurl-row{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.wurl-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(76,201,240,.1);
  border:1px solid rgba(76,201,240,.3);color:var(--teal);padding:6px 14px;border-radius:20px;
  font-size:12px;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;font-weight:500;}
.wurl-btn:hover{background:rgba(76,201,240,.2);}
.curl-btn{background:var(--tag);border:1px solid var(--border);color:var(--muted);padding:6px 11px;
  border-radius:20px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .18s;}
.curl-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.mactions{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap;}
.mac{flex:1;min-width:100px;padding:10px 14px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;
  font-weight:500;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;}
.mac:hover{border-color:var(--accent2);color:var(--accent2);}
.mac.purple:hover{border-color:var(--purple);color:var(--purple);}
.mac.blue:hover{border-color:var(--teal);color:var(--teal);}
.mac.red:hover{border-color:var(--accent);color:var(--accent);}

/* EDIT MODAL */
.edit-sub{font-size:13px;font-family:'DM Sans',sans-serif;color:var(--accent2);font-weight:500;
  display:block;margin-bottom:18px;margin-top:-12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eup-zone{border:2px dashed var(--border);border-radius:10px;padding:16px 12px;text-align:center;
  background:var(--surface);position:relative;cursor:pointer;transition:border-color .2s,background .2s;overflow:hidden;}
.eup-zone:hover{border-color:var(--accent);background:rgba(230,57,70,.04);}
.eup-zone input[type="file"]{position:absolute;inset:0;width:100%;height:100%;
  opacity:0;cursor:pointer;z-index:5;border:none;padding:0;margin:0;}
.eup-hint{font-size:12px;color:var(--muted);pointer-events:none;}
.ethumb{width:100%;max-height:150px;object-fit:cover;border-radius:8px;
  margin-top:9px;display:none;pointer-events:none;}
.edit-acts{display:flex;gap:9px;margin-top:18px;}
.btn-save{flex:1;background:linear-gradient(135deg,#1f6b3a,#165229);border:none;color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;padding:12px;
  border-radius:10px;cursor:pointer;transition:opacity .2s;}
.btn-save:hover{opacity:.88;}
.btn-cancel{background:var(--surface);border:1px solid var(--border);color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:13px;padding:12px 18px;border-radius:10px;cursor:pointer;transition:all .18s;}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent);}

@media(max-width:860px){
  .main{grid-template-columns:1fr;}
  .sidebar{position:static;max-height:none;}
  header{padding:14px 18px;}
  .content{padding:18px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">WatchList<span>// ANIME &amp; MEDIA TRACKER</span></div>
  <div class="hdr-pills">
    <div class="hdr-pill" id="hdrTotal">0 TITLES</div>
    <div class="hdr-pill red" id="hdrWatch">0 WATCHING</div>
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Add to Watchlist</div>
    <div class="field">
      <label>Type</label>
      <select id="aType">
        <option value="Anime">🎌 Anime</option>
        <option value="Web Series">📺 Web Series</option>
        <option value="Movie">🎬 Movie</option>
        <option value="TV Show">📡 TV Show</option>
        <option value="Manga">📚 Manga</option>
        <option value="Documentary">🎥 Documentary</option>
        <option value="Other">✨ Other</option>
      </select>
    </div>
    <div class="field"><label>Title Name</label><input type="text" id="aTitle" placeholder="e.g. Attack on Titan"/></div>
    <button class="btn-ai" id="aiFillBtn">
      <span class="ai-icon">✦</span><div class="spinner"></div> Auto-fill with AI
    </button>
    <div class="row2">
      <div class="field"><label>Seasons</label><input type="number" id="aSeasons" placeholder="e.g. 4" min="0"/></div>
      <div class="field"><label>Episodes</label><input type="number" id="aEpisodes" placeholder="e.g. 87" min="0"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Year</label><input type="text" id="aYear" placeholder="e.g. 2013"/></div>
      <div class="field"><label>Genre</label><input type="text" id="aGenre" placeholder="e.g. Action"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Studio / Network</label><input type="text" id="aStudio" placeholder="e.g. MAPPA"/></div>
      <div class="field">
        <label>Status</label>
        <select id="aStatus">
          <option value="planned">📋 Plan to Watch</option>
          <option value="watching">▶️ Watching</option>
          <option value="completed">✅ Completed</option>
          <option value="dropped">❌ Dropped</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Description</label><textarea id="aDesc" placeholder="Synopsis or notes..."></textarea></div>
    <div class="field">
      <label>Your Rating</label>
      <div class="stars" id="aStars">
        <span class="star" data-v="1">⭐</span><span class="star" data-v="2">⭐</span>
        <span class="star" data-v="3">⭐</span><span class="star" data-v="4">⭐</span>
        <span class="star" data-v="5">⭐</span>
      </div>
    </div>
    <div class="field">
      <label>Cover Image</label>
      <div class="upload-zone" id="aUpZone">
        <input type="file" accept="image/*" id="aImgIn"/>
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">Click or drag &amp; drop<br><small style="opacity:.6">PNG · JPG · WEBP</small></div>
        <img class="upload-preview" id="aImgPrev" alt=""/>
      </div>
    </div>
    <div class="field">
      <label>Watch URL <span style="color:var(--muted);font-size:9px;">(optional)</span></label>
      <input type="url" id="aUrl" placeholder="https://crunchyroll.com/..."/>
    </div>
    <button class="btn-primary" id="addBtn">ADD TO WATCHLIST</button>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    <div class="content-header">
      <div class="content-title">My Watchlist</div>
      <input class="search-bar" type="text" id="searchBar" placeholder="🔍 Search..."/>
    </div>
    <div class="filter-tabs">
      <button class="tab active" data-f="all">All</button>
      <button class="tab" data-f="Anime">Anime</button>
      <button class="tab" data-f="Web Series">Web Series</button>
      <button class="tab" data-f="Movie">Movie</button>
      <button class="tab" data-f="TV Show">TV Show</button>
      <button class="tab" data-f="Other">Other</button>
    </div>
    <div class="cards-grid" id="grid"></div>
  </main>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOv">
  <div class="mbox">
    <button class="mclose" id="detailClose">×</button>
    <div id="detailBody"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOv">
  <div class="mbox wide">
    <button class="mclose" id="editClose">×</button>
    <div class="mtitle">Edit En
